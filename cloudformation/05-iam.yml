AWSTemplateFormatVersion: "2010-09-09"
Description: IAM roles for ECS task execution and runtime (family-recipes)

Resources:
  # Used by ECS to pull the image from ECR and read secrets
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: family-recipes-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue family-recipes-db-secret-arn
                  - !ImportValue family-recipes-app-secret-arn

  # Used by the running app — S3 access via task role, no static keys needed
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: family-recipes-ecs-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3RecipeImages
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: arn:aws:s3:::family-recipes-715991861892-eu-west-2-an/recipes/*

Outputs:
  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
    Export:
      Name: family-recipes-execution-role-arn
  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
    Export:
      Name: family-recipes-task-role-arn
