AWSTemplateFormatVersion: "2010-09-09"
Description: IAM instance role for EC2 running family-recipes

Resources:
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: family-recipes-ec2-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      # Enables SSM Session Manager — no SSH or bastion host needed
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ECRPull
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: !ImportValue family-recipes-ecr-arn
        - PolicyName: ReadSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !ImportValue family-recipes-db-secret-arn
                  - !ImportValue family-recipes-app-secret-arn
        - PolicyName: S3RecipeImages
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: arn:aws:s3:::family-recipes-715991861892-eu-west-2-an/recipes/*

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: family-recipes-ec2-profile
      Roles:
        - !Ref EC2Role

Outputs:
  InstanceProfileName:
    Value: !Ref EC2InstanceProfile
    Export:
      Name: family-recipes-instance-profile-name
