AWSTemplateFormatVersion: "2010-09-09"
Description: App secrets in Secrets Manager for family-recipes

# Deploy this stack after RDS is up, then fill in the placeholder values
# via the AWS console or CLI before deploying ECS.

Parameters:
  AuthSecret:
    Type: String
    NoEcho: true
    Description: NextAuth AUTH_SECRET (run `openssl rand -base64 32`)
  GoogleClientId:
    Type: String
    NoEcho: true
  GoogleClientSecret:
    Type: String
    NoEcho: true
  AdminEmail:
    Type: String
    Default: bastiaan.hebing@gmail.com

Resources:
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: family-recipes/app
      Description: Application environment variables
      SecretString: !Sub |
        {
          "AUTH_SECRET": "${AuthSecret}",
          "GOOGLE_CLIENT_ID": "${GoogleClientId}",
          "GOOGLE_CLIENT_SECRET": "${GoogleClientSecret}",
          "ADMIN_EMAIL": "${AdminEmail}",
          "S3_BUCKET_NAME": "family-recipes-715991861892-eu-west-2-an",
          "AWS_REGION": "eu-west-2",
          "NEXT_PUBLIC_BASE_URL": "https://klaproosnet.nl"
        }

Outputs:
  AppSecretArn:
    Value: !Ref AppSecret
    Export:
      Name: family-recipes-app-secret-arn
