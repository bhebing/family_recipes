AWSTemplateFormatVersion: "2010-09-09"
Description: ECR repository for family-recipes Docker images

Resources:
  Repository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: family-recipes
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  RepositoryUri:
    Value: !GetAtt Repository.RepositoryUri
    Export:
      Name: family-recipes-ecr-uri
  RepositoryArn:
    Value: !GetAtt Repository.Arn
    Export:
      Name: family-recipes-ecr-arn
