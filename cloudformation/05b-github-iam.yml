AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions deploy role (family-recipes). OIDC provider created separately via CLI.

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub username or organisation (e.g. bhebing)
  GitHubRepo:
    Type: String
    Default: family_recipes
  AWSAccountId:
    Type: String
    Description: Your AWS account ID (run `aws sts get-caller-identity --query Account --output text`)

Resources:
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: family-recipes-github-actions-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWSAccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: DeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !ImportValue family-recipes-ecr-arn
              # Trigger /app/deploy.sh on the EC2 instance via SSM Run Command
              - Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - !Sub "arn:aws:ec2:eu-west-2:${AWSAccountId}:instance/*"
                  - arn:aws:ssm:eu-west-2::document/AWS-RunShellScript
              # Wait for the command to complete in CI
              - Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                Resource: "*"
              # Look up the instance ID from the CloudFormation stack output
              - Effect: Allow
                Action: cloudformation:DescribeStacks
                Resource: !Sub "arn:aws:cloudformation:eu-west-2:${AWSAccountId}:stack/family-recipes-ec2/*"

Outputs:
  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
    Export:
      Name: family-recipes-github-role-arn
